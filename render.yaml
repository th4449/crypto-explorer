# Render deployment configuration
# https://render.com/docs/blueprint-spec

databases:
  - name: crypto-explorer-db
    plan: starter
    databaseName: crypto_explorer
    user: app_user
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: crypto-explorer-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crypto-explorer-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://crypto-explorer-web.onrender.com
      - key: OPENSANCTIONS_API_KEY
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"

  - type: web
    name: crypto-explorer-web
    runtime: node
    plan: starter
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crypto-explorer-db
          property: connectionString
      - key: NEXTAUTH_URL
        value: https://crypto-explorer-web.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_API_URL
        value: https://crypto-explorer-api.onrender.com
      - key: EMAIL_SERVER
        sync: false
      - key: EMAIL_FROM
        value: noreply@crypto-explorer.local
      - key: NODE_VERSION
        value: "20"

  - type: cron
    name: crypto-explorer-daily-reset
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    schedule: "0 0 * * *"
    startCommand: python scripts/reset_rate_limits.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crypto-explorer-db
          property: connectionString
